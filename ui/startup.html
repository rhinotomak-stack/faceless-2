<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: asset: file:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset: file:;">
    <title>Start Project</title>
    <link rel="stylesheet" href="./css/startup.css" />
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="shell">
        <header class="brand">
            <img src="../assets/icon-taskbar.png" alt="Logo" class="brand-logo" onerror="this.src='../assets/icon.png'" />
            <div>
                <p class="brand-kicker">YTA Empire WEBGL</p>
                <h1>Start A Project</h1>
            </div>
        </header>

        <section class="panel">
            <p class="subtitle">Choose how you want to continue.</p>

            <div class="actions">
                <button id="btn-new-project" class="btn btn-primary">Create New Project</button>
                <button id="btn-open-folder" class="btn btn-secondary">Open Project Folder</button>
                <button id="btn-open-file" class="btn btn-ghost">Open .fvp Project File</button>
            </div>

            <div id="status" class="status" aria-live="polite"></div>
        </section>

        <button id="btn-exit" class="btn-exit">Exit</button>
    </main>

    <script src="./js/startup.js"></script>
</body>
</html>
